<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Видео плеер</title>
  <link rel="stylesheet" href="./static/bootstrap.min.css">
  <link rel="stylesheet" href="./static/font-awesome.min.css">
  <style>
    body {
      min-height: 100vh;
      background: #f5f7fb;
    }

    .player-shell {
      max-width: 900px;
      margin: 40px auto;
    }

    .player-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    .player-frame {
      background: #0b0b0b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 1.5);;
    }

    .player-top-strip {
      height: 92px;
      background: #0b0b0b;
    }

    .player-controls {
      background: #0b0b0b;
      color: #fff;
      padding: 12px;
      min-height: 92px;
    }

    .player-controls .btn {
      border: 1px solid #3b3b3b;
      background: #171717;
      color: #fff;
    }

    .player-controls .btn:hover,
    .player-controls .btn:focus {
      background: #222;
      color: #fff;
    }

    .player-controls .btn--transparent,
    .player-controls .btn--transparent:hover,
    .player-controls .btn--transparent:focus {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      color: #fff;
    }

    .js-progress {
      height: 8px;
      cursor: pointer;
      background: #3a3a3a;
      border-radius: 999px;
      overflow: hidden;
    }

    .js-progress-slider {
      height: 100%;
      width: 0;
      background: #ffd54a;
    }

    .js-video-container {
      width: 100%;
      height: 100%;
    }

    .time-display {
      display: inline-block;
    }
  </style>
</head>
<body>
  <main class="container player-shell">
    <h1 class="h3 mb-3">Видеоплеер</h1>

    <div id="player" class="mb-3">
      <div class="player-frame">
        <div class="player-top-strip"></div>
        <div class="player-box">
          <div class="js-video-container w-100 h-100"></div>
        </div>

        <div class="player-controls">
          <div class="d-flex flex-wrap gap-2 mb-2">
            <button class="btn btn--transparent js-play-button" type="button">
              <i class="fa fa-play" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-pause-button" type="button" hidden>
              <i class="fa fa-pause" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-volume-button" type="button">
              <i class="fa fa-volume-off" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-mute-button" type="button" hidden>
              <i class="fa fa-volume-up" aria-hidden="true"></i>
            </button>
            <button class="btn btn--transparent js-fullscreen-button" type="button">
              <i class="fa fa-expand" aria-hidden="true"></i>
            </button>
          </div>

          <div class="mb-2">
            <span class="js-current-time time-display">00:00</span>
            <span class="mx-1">/</span>
            <span class="js-duration time-display">00:00</span>
          </div>

          <div class="js-progress">
            <div class="js-progress-slider">progress</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="./player.js"></script>
  <script src="./static/bootstrap.bundle.min.js"></script>
  <script>
    createPlayer({
      elementId: 'player',
      src: 'https://dvmn.org/media/filer_public/78/db/78db3456-3fd3-4504-9ed9-d2d1fd843c0b/highest_peak.mp4'
    });
  </script>
</body>
</html>
